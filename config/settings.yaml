detection:
  model_primary: "yolov8s.pt"       # Small model — best accuracy/speed balance
  model_fallback: "yolov8n.pt"      # Fallback if s not available
  confidence_threshold: 0.25        # Lower = catch more vehicles (was 0.45)
  iou_threshold: 0.45               # Slightly lower to catch adjacent vehicles
  input_size: 640                   # Standard YOLO input
  target_classes:
    car: 2
    motorcycle: 3
    bus: 5
    truck: 7
    person: 0

tracking:
  enabled: true
  tracker: "bytetrack"              # Best tracker for traffic scenarios
  min_hits: 2                       # Track must appear in 2 frames to count
  max_age: 15                       # Track kept alive for 15 frames after disappearing
  min_iou: 0.3

counting:
  method: "peak_window"             # Use peak count across sliding window
  window_frames: 30                 # Look at 30-frame windows (~1 second at 30fps)
  use_unique_ids: true              # Count unique track IDs not raw detections
  sample_every_n_frames: 3         # Process every 3rd frame for speed

vehicle_weights:                # Density contribution per vehicle type
  car: 1.0
  motorcycle: 0.5
  bus: 2.5
  truck: 3.0
  person: 0.8                   # Pedestrian weight
  emergency: 50.0               # Massive weight to trigger immediate green
  unknown: 1.0

signal_timing:
  t_min: 10                     # Minimum green time in seconds
  t_max: 90                     # Maximum green time in seconds
  t_pedestrian: 15              # Minimum green time for pedestrian rounds
  k_factor: 1.5                 # Scaling factor
  yellow_time: 3                # Fixed yellow phase
  all_red_time: 2               # All-red clearance between phases
  starvation_threshold: 2       # Max cycles a lane can be skipped before priority boost
  priority_multiplier: 1.4      # Density boost for starved lanes
  emergency_override: true      # Enable EVP

preprocessing:
  enable_clahe: true            # Contrast Limited Adaptive Histogram Equalization
  clahe_clip_limit: 2.0
  clahe_tile_size: [8, 8]
  target_frame_size: [640, 640]

simulation:
  num_lanes: 4
  lane_names: ["North", "South", "East", "West"]
  default_fixed_timer: 30       # Seconds for fixed-timer baseline

logging:
  output_dir: "outputs/logs"
  csv_filename: "session_log.csv"
  log_level: "INFO"

visualization:
  charts_dir: "outputs/charts"
  annotated_dir: "outputs/annotated"
  show_live_window: true
  save_annotated_frames: true
  font_scale: 0.6
  box_thickness: 2
