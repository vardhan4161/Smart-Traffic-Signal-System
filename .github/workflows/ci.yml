name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt --no-deps
        # Re-install light dependencies for CI
        pip install ultralytics opencv-python-headless numpy pyyaml pandas matplotlib seaborn loguru click rich pytest pytest-cov
    - name: Run tests
      run: |
        pytest tests/ -v --cov=src
